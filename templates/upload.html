<!DOCTYPE html>
<html>
<head>
    <title>Secure File Sharing - Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Secure File Sharing</h1>
        <h2>Upload File</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="post" enctype="multipart/form-data" action="/upload">
            <p>
                <label for="file">Select file:</label><br>
                <input type="file" name="file" required>
            </p>
            
            <p>
                <label for="password">Optional password protection:</label><br>
                <input type="password" name="password" placeholder="Leave empty for no password">
            </p>
            
            <p>
                <label for="expiry_hours">Link expires in (hours):</label><br>
                <input type="number" name="expiry_hours" value="24" min="1" max="168">
            </p>
            
            <p>
                <input type="submit" value="Upload & Encrypt">
            </p>
        </form>
        
        <p><a href="/links">View Active Links</a></p>
    </div>

</body>
</html>
